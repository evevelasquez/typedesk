<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYPEDESK — private personality intelligence</title>
<!-- Standalone build. Data stays in this browser's localStorage; nothing is sent anywhere. -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0c10'/%3E%3Ctext x='16' y='22' font-family='Menlo,monospace' font-size='16' fill='%23e0a64e' text-anchor='middle'%3ETD%3C/text%3E%3C/svg%3E">
<style>
/* TYPEDESK — private analyst desk. Dark, tactile, no externals. */

:root {
  --bg: #11100d;
  --bg2: #15130f;
  --panel: #1d1a15;
  --panel2: #242018;
  --panel3: #2d281f;
  --line: #3a3328;
  --line2: #504635;
  --text: #f0ece2;
  --mut: #b1a896;
  --dim: #7b725f;
  --amber: #c9a46a;
  --amber-dim: #7b633c;
  --amber-ink: #19130a;
  --teal: #8bb69c;
  --red: #c36f5d;
  --green: #8dbd78;
  --ax-ei: #7f9fb6;
  --ax-sn: #8bb69c;
  --ax-tf: #c9a46a;
  --ax-jp: #b08aa0;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --rad: 7px;
  --shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
  --edge: inset 0 1px 0 rgba(255, 255, 255, 0.04);
  --lift: 0 16px 36px -22px rgba(0, 0, 0, 0.85);
  --glow-amber: 0 0 18px rgba(201, 164, 106, 0.2);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px) 0 0 / 34px 34px,
    linear-gradient(0deg, rgba(255, 255, 255, 0.014) 1px, transparent 1px) 0 0 / 34px 34px,
    radial-gradient(900px 520px at 86% -12%, rgba(201, 164, 106, 0.08), transparent 62%),
    radial-gradient(820px 560px at -15% 110%, rgba(139, 182, 156, 0.055), transparent 58%),
    var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14.5px;
  line-height: 1.5;
  min-height: 100vh;
}
button, input, textarea, select { font: inherit; color: inherit; }
button { cursor: pointer; }
a { color: var(--amber); text-decoration: none; }
a:hover { text-decoration: underline; }
::selection { background: rgba(224, 166, 78, 0.3); }

#app { display: grid; grid-template-columns: 252px 1fr; min-height: 100vh; }

/* ---------- sidebar ---------- */
#sidebar {
  border-right: 1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(36, 32, 24, 0.96), rgba(17, 16, 13, 0.98) 72%),
    var(--bg);
  padding: 18px 14px 14px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.brand { display: flex; gap: 10px; align-items: center; margin: 2px 4px 18px; }
.brand-mark {
  width: 34px; height: 34px; border-radius: 6px;
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  font-family: var(--mono); font-weight: 700; font-size: 13px;
  display: grid; place-items: center;
  background: linear-gradient(160deg, rgba(201, 164, 106, 0.16), rgba(139, 182, 156, 0.045));
  box-shadow: var(--glow-amber);
}
#sidebar h1 {
  margin: 0; font-family: var(--mono); font-size: 15px;
  letter-spacing: 0.18em; font-weight: 700;
}
.brand-sub { font-size: 10.5px; color: var(--dim); font-family: var(--mono); letter-spacing: 0.06em; }

#nav { display: flex; flex-direction: column; gap: 1px; }
.nav-sec {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--dim);
  margin: 14px 8px 5px;
}
#nav a {
  color: var(--mut); padding: 7px 10px; border-radius: 7px;
  font-size: 13.5px; border: 1px solid transparent;
  transition: color 0.14s ease, background 0.14s ease, border-color 0.14s ease;
}
#nav a:hover { color: var(--text); background: var(--panel); text-decoration: none; }
#nav a.active {
  color: var(--amber);
  background: linear-gradient(90deg, rgba(201, 164, 106, 0.13), rgba(139, 182, 156, 0.035));
  border-color: rgba(201, 164, 106, 0.28);
}
.side-foot { margin-top: auto; padding: 14px 8px 2px; }
#storage-note { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 0.04em; }

/* ---------- main / topbar ---------- */
#main { min-width: 0; display: flex; flex-direction: column; }
#topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 22px; border-bottom: 1px solid var(--line);
  background: rgba(17, 16, 13, 0.88); backdrop-filter: blur(6px);
  position: sticky; top: 0; z-index: 40;
}
#menu-btn { display: none; }
#crumb { font-family: var(--mono); font-size: 12px; color: var(--mut); letter-spacing: 0.08em; }
.top-actions { margin-left: auto; display: flex; gap: 8px; }
#view { padding: 22px; max-width: 1280px; width: 100%; margin: 0 auto; }

/* ---------- generic ---------- */
.panel {
  background: linear-gradient(180deg, var(--panel2), var(--panel) 68%);
  border: 1px solid var(--line);
  border-radius: var(--rad);
  padding: 16px 18px;
  margin-bottom: 16px;
  box-shadow: var(--edge), var(--lift);
  transition: border-color 0.18s ease, box-shadow 0.18s ease;
}
.panel.tight { padding: 12px 14px; }
.panel h3, .ptitle {
  margin: 0 0 10px;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim);
}
.panel h3::before, .ptitle::before {
  content: ""; display: inline-block; width: 5px; height: 5px;
  border-radius: 1px; background: var(--amber); margin-right: 8px;
  vertical-align: middle; box-shadow: 0 0 7px rgba(201, 164, 106, 0.55); opacity: 0.72;
}
.panel h3 .hint { float: right; letter-spacing: 0; text-transform: none; color: var(--dim); font-weight: 400; }
.panel h3 .hint::before { display: none; }
h2.page-title { font-size: 21px; margin: 2px 0 4px; letter-spacing: -0.01em; }
.page-sub { color: var(--mut); margin: 0 0 18px; max-width: 70ch; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.spread { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
.muted { color: var(--mut); }
.dim { color: var(--dim); }
.small { font-size: 12.5px; }
.mono { font-family: var(--mono); }
hr.sep { border: 0; border-top: 1px solid var(--line); margin: 14px 0; }

.btn {
  background: var(--panel2); border: 1px solid var(--line2);
  color: var(--text); border-radius: 8px; padding: 8px 14px;
  font-size: 13.5px; line-height: 1.2;
  transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease, color 0.15s ease;
}
.btn:hover { border-color: var(--amber-dim); text-decoration: none; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn.primary { background: var(--amber); border-color: var(--amber); color: var(--amber-ink); font-weight: 700; }
.btn.primary:hover { filter: brightness(1.08); box-shadow: 0 8px 22px -10px rgba(224, 166, 78, 0.9); }
.btn.ghost { background: transparent; }
.btn.danger { color: #f2b8b8; border-color: rgba(217, 99, 99, 0.5); background: rgba(217, 99, 99, 0.08); }
.btn.danger:hover { border-color: var(--red); }
.btn.small { padding: 5px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.45; cursor: default; transform: none; }

input[type="text"], input[type="date"], input[type="number"], textarea, select {
  background: var(--bg2); border: 1px solid var(--line2); border-radius: 8px;
  color: var(--text); padding: 8px 10px; width: 100%;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
textarea { resize: vertical; min-height: 70px; }
input:focus, textarea:focus, select:focus, .btn:focus-visible {
  outline: none; border-color: var(--amber-dim);
  box-shadow: 0 0 0 2px rgba(201, 164, 106, 0.14);
}
label.fld { display: block; margin-bottom: 10px; }
label.fld > span {
  display: block; font-family: var(--mono); font-size: 10.5px;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); margin-bottom: 4px;
}

.chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 11px;
  border: 1px solid var(--line2); border-radius: 999px;
  padding: 2px 9px; color: var(--mut); white-space: nowrap;
  transition: border-color 0.14s ease, color 0.14s ease, background 0.14s ease;
}
.chip.amber { color: var(--amber); border-color: rgba(224, 166, 78, 0.4); }
.chip.teal { color: var(--teal); border-color: rgba(67, 185, 164, 0.4); }
.chip.red { color: var(--red); border-color: rgba(217, 99, 99, 0.45); }
.chip.click { cursor: pointer; }
.chip.click:hover { border-color: var(--amber); color: var(--amber); }

.typecode {
  font-family: var(--mono); font-weight: 700; letter-spacing: 0.1em;
  color: var(--amber);
}
.bigtype {
  font-family: var(--mono); font-size: 46px; font-weight: 700;
  letter-spacing: 0.14em; color: var(--amber);
  text-shadow: 0 0 30px rgba(201, 164, 106, 0.18);
  line-height: 1.1;
}
/* per-letter axis coloring for the four-letter hero code */
.typeglyph { display: inline; }
.typeglyph i { font-style: normal; }
.typeglyph i.g-ei { color: var(--ax-ei); text-shadow: 0 0 22px rgba(127, 159, 182, 0.34); }
.typeglyph i.g-sn { color: var(--ax-sn); text-shadow: 0 0 22px rgba(139, 182, 156, 0.34); }
.typeglyph i.g-tf { color: var(--ax-tf); text-shadow: 0 0 22px rgba(201, 164, 106, 0.34); }
.typeglyph i.g-jp { color: var(--ax-jp); text-shadow: 0 0 22px rgba(176, 138, 160, 0.34); }

/* ---------- kpis ---------- */
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
.kpi {
  position: relative; overflow: hidden;
  background: linear-gradient(180deg, var(--panel2), var(--panel) 70%);
  border: 1px solid var(--line); border-radius: var(--rad); padding: 14px 16px;
  box-shadow: var(--edge), var(--lift);
  transition: transform 0.18s ease, border-color 0.18s ease;
}
.kpi::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--amber), transparent 78%); opacity: 0.6; }
.kpi:nth-child(1)::before { background: linear-gradient(90deg, var(--ax-ei), transparent 78%); }
.kpi:nth-child(2)::before { background: linear-gradient(90deg, var(--ax-sn), transparent 78%); }
.kpi:nth-child(3)::before { background: linear-gradient(90deg, var(--ax-tf), transparent 78%); }
.kpi:nth-child(4)::before { background: linear-gradient(90deg, var(--amber), transparent 78%); }
.kpi:nth-child(5)::before { background: linear-gradient(90deg, var(--ax-jp), transparent 78%); }
.kpi:hover { transform: translateY(-2px); border-color: var(--line2); }
.kpi .n { font-family: var(--mono); font-size: 26px; font-weight: 700; color: var(--text); }
.kpi.flag .n { color: var(--red); }
.kpi .ic { position: absolute; top: 12px; right: 13px; color: var(--dim); opacity: 0.85; }
.kpi.flag .ic { color: var(--red); opacity: 1; }
.kpi.flag::before { background: linear-gradient(90deg, var(--red), transparent 78%); opacity: 0.85; }
.kpi .l { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); margin-top: 2px; }
.ic { vertical-align: middle; }
.act-row { display: flex; gap: 8px; align-items: flex-start; margin: 7px 0; }
.act-ic { flex: 0 0 auto; color: var(--dim); margin-top: 1px; }
.act-ic.k-test { color: var(--amber); }
.act-ic.k-quote { color: var(--ax-tf); }
.act-ic.k-ev { color: var(--ax-sn); }

/* ---------- axis bars ---------- */
.axisbar { margin: 10px 0 14px; }
.axisbar .ab-top { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11.5px; margin-bottom: 4px; }
.axisbar .ab-top b { font-size: 12px; }
.ab-track {
  position: relative; height: 14px; border-radius: 7px;
  background: linear-gradient(90deg, var(--panel3), var(--bg2) 50%, var(--panel3));
  border: 1px solid var(--line);
}
.ab-band { position: absolute; top: 0; bottom: 0; background: rgba(255, 255, 255, 0.07); border-radius: 7px; }
.ab-mark { position: absolute; top: -3px; width: 4px; height: 20px; border-radius: 2px; transform: translateX(-2px); box-shadow: 0 0 10px currentColor; }
.ab-mid { position: absolute; left: 50%; top: 2px; bottom: 2px; width: 1px; background: var(--line2); }
.ab-note { font-size: 11px; color: var(--dim); margin-top: 3px; font-family: var(--mono); }
.c-ei { color: var(--ax-ei); } .b-ei { background: var(--ax-ei); color: var(--ax-ei); }
.c-sn { color: var(--ax-sn); } .b-sn { background: var(--ax-sn); color: var(--ax-sn); }
.c-tf { color: var(--ax-tf); } .b-tf { background: var(--ax-tf); color: var(--ax-tf); }
.c-jp { color: var(--ax-jp); } .b-jp { background: var(--ax-jp); color: var(--ax-jp); }

/* ---------- meters / gauges ---------- */
.meter { height: 7px; border-radius: 4px; background: var(--bg2); border: 1px solid var(--line); overflow: hidden; }
.meter > i { display: block; height: 100%; background: var(--amber); }
.meter.teal > i { background: var(--teal); }
.meter.red > i { background: var(--red); }
.gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }

/* ---------- posterior list ---------- */
.post-row { display: grid; grid-template-columns: 64px 1fr 52px; gap: 10px; align-items: center; margin: 6px 0; }
.post-row .typecode { font-size: 13px; }
.post-row .bar { height: 10px; border-radius: 5px; background: var(--bg2); border: 1px solid var(--line); overflow: hidden; }
.post-row .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--amber-dim), var(--amber)); box-shadow: 0 0 12px rgba(201, 164, 106, 0.28); }
.post-row .pv { font-family: var(--mono); font-size: 12px; color: var(--mut); text-align: right; }

/* ---------- test runner ---------- */
.runner { max-width: 760px; margin: 0 auto; }
.run-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.run-prog { flex: 1; }
.run-prog .meter > i { transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
.run-count { font-family: var(--mono); font-size: 12px; color: var(--mut); white-space: nowrap; }
.qcard {
  background:
    linear-gradient(180deg, rgba(45, 40, 31, 0.96), rgba(29, 26, 21, 0.98) 68%),
    var(--panel);
  border: 1px solid var(--line);
  border-radius: 9px;
  padding: 26px 28px;
  box-shadow: var(--edge), 0 22px 52px rgba(0, 0, 0, 0.34);
}
.qcat {
  display: inline-flex;
  border: 1px solid rgba(201, 164, 106, 0.22);
  border-radius: 999px;
  padding: 3px 9px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--mut);
  margin-bottom: 14px;
  background: rgba(201, 164, 106, 0.045);
}
.qtext { font-size: 19px; line-height: 1.46; margin-bottom: 20px; font-weight: 560; color: #f5efe3; }
.qnote { font-size: 13px; color: var(--mut); line-height: 1.4; margin: -12px 0 18px; padding-left: 11px; border-left: 2px solid var(--line2); }
.opt {
  display: block; width: 100%; text-align: left;
  background: rgba(21, 19, 15, 0.72); border: 1px solid var(--line2); border-radius: 8px;
  padding: 13px 15px; margin: 8px 0; font-size: 15px; line-height: 1.4;
  transition: border-color 0.14s ease, background 0.14s ease, transform 0.1s ease, box-shadow 0.14s ease;
}
.opt:hover { border-color: var(--amber-dim); background: rgba(45, 40, 31, 0.9); transform: translateX(2px); }
.opt.sel {
  border-color: var(--amber);
  background: rgba(201, 164, 106, 0.11);
  box-shadow: inset 3px 0 0 var(--amber);
}
.opt .ok { font-family: var(--mono); color: var(--amber); margin-right: 8px; font-weight: 700; }
.likert { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; margin-top: 4px; }
.likert button {
  background: rgba(21, 19, 15, 0.72); border: 1px solid var(--line2); border-radius: 8px;
  padding: 11px 4px; font-size: 11.5px; line-height: 1.25; color: var(--mut);
  min-height: 76px;
  transition: border-color 0.14s ease, color 0.14s ease, background 0.14s ease, transform 0.1s ease, box-shadow 0.14s ease;
}
.likert button:hover { border-color: var(--amber-dim); color: var(--text); transform: translateY(-2px); }
.likert button.sel {
  border-color: var(--amber);
  color: var(--amber);
  background: rgba(201, 164, 106, 0.11);
  box-shadow: inset 0 3px 0 var(--amber);
}
.likert button b { display: block; font-family: var(--mono); font-size: 15px; margin-bottom: 3px; color: var(--text); }
.likert button.sel b { color: var(--amber); }
.scale-track {
  height: 3px;
  border-radius: 3px;
  margin: 2px 6px 12px;
  background: linear-gradient(90deg, var(--dim), var(--line2) 50%, var(--amber));
  opacity: 0.55;
}
.lk-lab { display: block; }
.duel { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: stretch; margin-top: 4px; }
.duel-or { align-self: center; font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); }
.duel-opt { margin: 0; display: flex; flex-direction: column; gap: 8px; }
.run-foot { display: flex; justify-content: space-between; margin-top: 16px; align-items: center; }
.kbd-hint { font-family: var(--mono); font-size: 10.5px; color: var(--dim); letter-spacing: 0.04em; }
.likert-anchors { display: none; }

/* ---------- tabs ---------- */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 16px; flex-wrap: wrap; }
.tabs button {
  background: transparent; border: 0; border-bottom: 2px solid transparent;
  color: var(--mut); padding: 8px 12px; font-size: 13px; font-family: var(--mono);
  letter-spacing: 0.04em; transition: color 0.14s ease, border-color 0.14s ease;
}
.tabs button:hover { color: var(--text); }
.tabs button.active { color: var(--amber); border-bottom-color: var(--amber); text-shadow: 0 0 14px rgba(224, 166, 78, 0.4); }

/* ---------- people list ---------- */
.person-card {
  display: grid; grid-template-columns: 1fr auto; gap: 6px 14px;
  background: linear-gradient(180deg, var(--panel2), var(--panel) 70%); border: 1px solid var(--line); border-radius: var(--rad);
  padding: 13px 16px; margin-bottom: 10px; cursor: pointer;
  box-shadow: var(--edge);
  transition: border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
}
.person-card:hover { border-color: var(--amber-dim); transform: translateY(-2px); box-shadow: var(--edge), var(--lift); }
.person-card .nm { font-weight: 650; font-size: 15px; }
.person-card .ctx { color: var(--mut); font-size: 12.5px; }

/* ---------- evidence ---------- */
.ev-item {
  border: 1px solid var(--line); border-left: 3px solid var(--line2);
  border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; background: var(--panel2);
  transition: border-color 0.14s ease, transform 0.14s ease;
}
.ev-item:hover { transform: translateX(2px); }
.ev-item.dir-pro { border-left-color: var(--teal); }
.ev-item.dir-con { border-left-color: var(--red); }
.ev-item .ev-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 6px; }
.ev-item .ev-text { font-size: 13.5px; }
.ev-item .ev-text.quote { font-style: italic; color: var(--amber2, #f0c47e); }
.ev-actions { margin-left: auto; display: flex; gap: 4px; }
.ev-actions button { background: none; border: 0; color: var(--dim); font-size: 12px; padding: 2px 4px; }
.ev-actions button:hover { color: var(--red); }

/* ---------- timeline ---------- */
.timeline { position: relative; padding-left: 22px; }
.timeline::before { content: ""; position: absolute; left: 7px; top: 4px; bottom: 4px; width: 1px; background: var(--line2); }
.tl-item { position: relative; margin-bottom: 14px; }
.tl-item::before {
  content: ""; position: absolute; left: -19px; top: 5px;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--panel); border: 2px solid var(--dim);
}
.tl-item.k-test::before { border-color: var(--amber); box-shadow: 0 0 9px rgba(224, 166, 78, 0.5); }
.tl-item.k-quote::before { border-color: var(--ax-tf); }
.tl-item.k-con::before { border-color: var(--red); }
.tl-date { font-family: var(--mono); font-size: 10.5px; color: var(--dim); letter-spacing: 0.08em; }

/* ---------- type grid (16-cell map) ---------- */
.tg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.tg a {
  position: relative; display: block; text-align: center;
  border: 1px solid var(--line); border-radius: 8px; padding: 10px 4px 8px;
  font-family: var(--mono); color: var(--text); font-size: 13px; letter-spacing: 0.08em;
  transition: border-color 0.14s ease, transform 0.14s ease, background 0.14s ease;
}

    const blocks = { NT: 0, NF: 0, SJ: 0, SP: 0 };
    typed.forEach((r) => blocks[block(r)]++);
    const withData = rows.filter((r) => r.comb.hasData);
    const buckets = { "\u226560%": 0, "40\u201359%": 0, "25\u201339%": 0, "<25%": 0 };
    withData.forEach((r) => {
      const j = r.comb.joint;
      if (j >= 0.6)
        buckets["\u226560%"]++;
      else if (j >= 0.4)
        buckets["40\u201359%"]++;
      else if (j >= 0.25)
        buckets["25\u201339%"]++;
      else
        buckets["<25%"]++;
    });
    const baseFirst = {};
    for (const ax of AXES) {
      let s = 0;
      for (const t of TYPE_LIST)
        if (t[AXES.indexOf(ax)] === LETTERS[ax][0])
          s += BASE_RATES[t];
      baseFirst[ax] = s / 100;
    }
    const biases = AXES.filter((ax) => Math.abs(letterShare[ax] - baseFirst[ax]) > 0.25);
    root.innerHTML = `
    ${pageHead("Network patterns", `Across ${n} typed ${n === 1 ? "person" : "people"} (engine hypothesis where available, otherwise your suspected type).`)}
    <div class="grid2">
      ${panel("Distribution", typeGridHTML(distPosterior, distPosterior[0].type))}
      <div>
        ${panel("Letter balance in your network", histBars(AXES.map((ax) => ({
      label: `${LETTERS[ax][0]} vs ${LETTERS[ax][1]}`,
      value: Math.round(letterShare[ax] * 100),
      display: `${Math.round(letterShare[ax] * 100)}% ${LETTERS[ax][0]}`,
      cls: ""
    }))))}
        ${panel("Temperament blocks", histBars(Object.entries(blocks).map(([k, v]) => ({ label: k, value: v, display: v }))))}
      </div>
    </div>
    <div class="grid2">
      ${panel("How sure are you, really", histBars(Object.entries(buckets).map(([k, v]) => ({ label: k, value: v, display: v }))) + `<div class="small dim" style="margin-top:6px">Joint certainty across active files. A desk full of sub-40% calls is honest; a desk full of 90% calls is a desk that has stopped looking.</div>`)}
      ${panel("Sampling & projection check", `
        ${biases.length ? biases.map((ax) => {
      const yours = Math.round(letterShare[ax] * 100), base = Math.round(baseFirst[ax] * 100);
      return `<div class="alert" style="margin-bottom:8px">Your network reads <b>${yours}% ${LETTERS[ax][0]}</b> vs ~${base}% in folk base rates. Either your circle is genuinely selected (plausible: jobs and cities filter hard), or you over-diagnose ${LETTERS[ax][letterShare[ax] > baseFirst[ax] ? 0 : 1]}. Worth one honest minute.</div>`;
    }).join("") : `<div class="small muted">No letter in your network deviates wildly from folk base rates. Either your sampling is broad or your reads are conservative. Both fine.</div>`}
        <div class="small dim">Base rates themselves are contested; this check flags <i>your</i> outliers, it doesn't certify the population numbers.</div>`)}
    </div>
    ${panel("Files", typed.map((r) => `
      <div class="spread" style="margin:6px 0;border-bottom:1px solid var(--line);padding-bottom:6px">
        <div><a href="#/person/${r.p.id}"><b>${esc(r.p.name)}</b></a> <span class="typecode" style="margin-left:6px">${r.type}</span>
        <span class="small dim">\xB7 ${esc(r.p.context || r.p.kind)}</span></div>
        <div>${r.comb.hasData ? `<span class="chip ${r.comb.joint >= 0.5 ? "teal" : r.comb.joint >= 0.3 ? "amber" : "red"}">${Math.round(r.comb.joint * 100)}%</span>` : `<span class="chip">suspected only</span>`}</div>
      </div>`).join(""))}`;
  }
  function viewExport(root) {
    const st = Store.state;
    const counts = Store.counts();
    const kb = (Store.bytesUsed() / 1024).toFixed(1);
    root.innerHTML = `
    ${pageHead("Export & settings", "Your data lives in this browser's localStorage and nowhere else. Back it up like you mean it.")}
    ${panel("Who's holding the pen", `
      <div class="grid2">
        <label class="fld"><span>Your name</span><input type="text" id="set-name" value="${esc(st.settings.myName || "")}" placeholder="Eve"></label>
        <label class="fld"><span>Your type (powers Compare defaults + projection warnings)</span>${typeSelect("set-type", st.settings.myType)}</label>
      </div>
      <div class="small dim">Don't know it? <a href="#/test/deep">Take the deep test</a> as yourself first. Typing others while untyped yourself is how projection wins.</div>`)}
    ${panel("Backup", `
      <div class="row">
        <button class="btn primary" id="exp-dl">Download JSON</button>
        <button class="btn" id="exp-copy">Copy to clipboard</button>
        <span class="small dim">${counts.people} people \xB7 ${counts.evidence} evidence \xB7 ${counts.results} results \xB7 ${kb} KB</span>
      </div>`)}
    ${panel("Import", `
      <div class="row" style="margin-bottom:8px">
        <label class="row small" style="gap:6px"><input type="radio" name="imp-mode" value="merge" checked> Merge (keep newer)</label>
        <label class="row small" style="gap:6px"><input type="radio" name="imp-mode" value="replace"> Replace everything</label>
      </div>
      <div class="row">
        <input type="file" id="imp-file" accept=".json,application/json" style="max-width:330px">
        <button class="btn" id="imp-go">Import file</button>
      </div>
      <div class="small dim" style="margin-top:6px">A snapshot is taken automatically before any import or wipe.</div>
      <div id="imp-msg"></div>`)}
    ${panel("Snapshots (last 5, automatic)", st.snapshots.length ? st.snapshots.map((s, i) => `
      <div class="spread" style="margin:6px 0">
        <span class="small">${esc(s.label)} \xB7 <span class="dim mono">${esc(s.ts.slice(0, 19).replace("T", " "))}</span></span>
        <button class="btn small" data-restore="${i}">Restore</button>
      </div>`).join("") : `<div class="small dim">None yet. They appear before imports and wipes.</div>`)}
    ${st.migratedLegacy === true && counts.people ? `<div class="alert">Found data from the old <span class="mono">mbti-typing-desk.html</span> (v0) and imported what was safely interpretable. Direction-ambiguous tags were imported as untagged notes rather than guessed at.</div>` : ""}
    ${panel("Share with testers", `
      <p class="small muted" style="margin:0 0 8px">Two ways to hand TYPEDESK to someone: send them the link where this app is hosted, or send the app as a single file (run <span class="mono">node build-standalone.js</span>, then share <span class="mono">dist/typedesk-standalone.html</span>; it opens with a double-click). Either way, every copy is fully private: each tester's data lives only in their own browser, and nothing syncs anywhere.</p>
      <p class="small muted" style="margin:0 0 8px">Feedback loop: have testers take a test, then use their copy's Export page to download JSON and send it back. Import it here with <b>Merge</b>, then attach their result to a dossier from the result page.</p>
      <p class="small dim" style="margin:0">TYPEDESK is an original instrument for private reflection, not affiliated with or endorsed by the Myers &amp; Briggs Foundation. If you ever share it beyond friends, keep that disclaimer attached.</p>`)}
    ${panel("Danger", `<button class="btn danger" id="wipe">Wipe all data</button> <span class="small dim">Snapshot taken first, but still: export before you do this.</span>`)}
  `;
    root.querySelector("#set-name").addEventListener("change", (e) => Store.setSettings({ myName: e.target.value.trim() }));
    root.querySelector('select[name="set-type"]').addEventListener("change", (e) => Store.setSettings({ myType: e.target.value }));
    root.querySelector("#exp-dl").addEventListener("click", () => download(`typedesk-backup-${todayISO()}.json`, Store.exportJSON()));
    root.querySelector("#exp-copy").addEventListener("click", (e) => {
      navigator.clipboard?.writeText(Store.exportJSON());
      e.target.textContent = "Copied";
      setTimeout(() => {
        e.target.textContent = "Copy to clipboard";
      }, 1e3);
    });
    root.querySelector("#imp-go").addEventListener("click", async () => {
      const f = root.querySelector("#imp-file").files[0];
      const msg = root.querySelector("#imp-msg");
      if (!f) {
        msg.innerHTML = `<div class="alert">Choose a file first.</div>`;
        return;
      }
      try {
        const text = await f.text();
        const mode = root.querySelector('input[name="imp-mode"]:checked').value;
        const res = Store.importJSON(text, mode);
        msg.innerHTML = `<div class="alert">Imported: ${res.people} people, ${res.results} results (${mode}).</div>`;
        setTimeout(() => viewExport(root), 900);
      } catch (err) {
        msg.innerHTML = `<div class="alert red">Import failed: ${esc(err.message)}</div>`;
      }
    });
    root.querySelectorAll("[data-restore]").forEach((b) => b.addEventListener("click", () => {
      if (confirm("Restore this snapshot? Current data is replaced (and snapshotted first).")) {
        Store.snapshot("pre-restore");
        Store.restoreSnapshot(Number(b.dataset.restore));
        viewExport(root);
      }
    }));
    root.querySelector("#wipe").addEventListener("click", () => {
      if (confirm("Wipe ALL people, evidence, and results?") && confirm("Really. Everything. Sure?")) {
        Store.wipe();
        location.hash = "#/";
      }
    });
  }

  // js/main.js
  var ROUTES = {
    "": { fn: (root) => viewDashboard(root), crumb: "Dashboard" },
    "people": { fn: (root) => viewPeople(root), crumb: "People" },
    "person": { fn: (root, a) => viewPerson(root, a[0], a[1] || "overview"), crumb: "Person file" },
    "test": { fn: (root, a) => a[0] ? viewRunner(root, a[0]) : viewTestHub(root), crumb: "Typing" },
    "result": { fn: (root, a) => viewResult(root, a[0]), crumb: "Result" },
    "compare": { fn: (root) => viewCompare(root), crumb: "Compare" },
    "interview": { fn: (root) => viewInterview(root), crumb: "Interview kit" },
    "library": { fn: (root) => viewLibrary(root), crumb: "Type library" },
    "type": { fn: (root, a) => viewType(root, (a[0] || "").toUpperCase()), crumb: "Type profile" },
    "functions": { fn: (root) => viewFunctions(root), crumb: "Cognitive functions" },
    "patterns": { fn: (root) => viewPatterns(root), crumb: "Network patterns" },
    "transcript": { fn: (root) => viewTranscript(root), crumb: "Transcript coder" },
    "export": { fn: (root) => viewExport(root), crumb: "Export & settings" }
  };
  function parseHash() {
    const h = location.hash.replace(/^#\/?/, "");
    const parts = h.split("/").filter(Boolean);
    return { key: parts[0] || "", args: parts.slice(1) };
  }
  function render() {
    window.__tdCleanup?.();
    window.__tdCleanup = null;
    const { key, args } = parseHash();
    const route = ROUTES[key] || ROUTES[""];
    const root = document.getElementById("view");
    route.fn(root, args);
    document.getElementById("crumb").textContent = route.crumb;
    const path = key + (args[0] && key === "test" ? "/" + args[0] : "");
    document.querySelectorAll("#nav a").forEach((a) => {
      a.classList.toggle("active", a.dataset.route === path || a.dataset.route === key && !(key === "test" && args[0]));
    });
    document.body.classList.remove("menu-open");
    root.scrollIntoView?.({ block: "start" });
    window.scrollTo(0, 0);
    const kb = (Store.bytesUsed() / 1024).toFixed(0);
    document.getElementById("storage-note").textContent = `local only \xB7 no accounts \xB7 no network \xB7 ${kb} KB on disk`;
  }
  function boot() {
    Store.load();
    document.getElementById("menu-btn").addEventListener("click", () => document.body.classList.toggle("menu-open"));
    document.getElementById("nav").addEventListener("click", (e) => {
      if (e.target.closest("a"))
        document.body.classList.remove("menu-open");
    });
    window.addEventListener("hashchange", render);
    render();
    window.TD = { Store, Engine: engine_exports, Session, version: "1.0.0" };
  }
  if (typeof document !== "undefined") {
    if (document.readyState === "loading")
      document.addEventListener("DOMContentLoaded", boot);
    else
      boot();
  }
})();

</script>
</body>
</html>
